<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outdoor Comp - Archivos de Expedición</title>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Staatliches&family=EB+Garamond:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #1a1612;
            --accent-orange: #e67e22;
            --paper: #d2b48c; /* Tan/Piel para el look de mapa */
            --ink: #2c251e;
            --vintage-font: 'Special Elite', cursive;
        }

        /* FILTRO DE PELÍCULA VIEJA */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.05;
            pointer-events: none;
            z-index: 9999;
        }

        body {
            font-family: 'EB Garamond', serif;
            margin: 0;
            background-color: var(--bg-dark);
            color: var(--paper);
            background-image: 
                linear-gradient(rgba(26, 22, 18, 0.85), rgba(26, 22, 18, 0.85)),
                url('https://images.unsplash.com/photo-1526772662000-3f88f10405ff?q=80&w=2000'); /* Fondo de mapa/bosque */
            background-attachment: fixed;
            background-size: cover;
        }

        /* --- CABECERA ESTILO PERIÓDICO VIEJO --- */
        header {
            border-bottom: 3px solid var(--accent-orange);
            padding: 20px;
            text-align: center;
            background: rgba(0,0,0,0.5);
        }

        .logo-area h1 {
            font-family: 'Staatliches', cursive;
            font-size: 4.5rem;
            color: var(--accent-orange);
            margin: 0;
            letter-spacing: 5px;
            text-shadow: 3px 3px 0px #000;
        }

        /* --- TARJETAS TIPO "EXPEDIENTE" --- */
        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .section-title {
            font-family: var(--vintage-font);
            text-align: center;
            border-bottom: 1px dashed var(--accent-orange);
            margin-bottom: 50px;
            padding-bottom: 10px;
        }

        .grid-expedientes {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .expediente-card {
            background: #251f1a;
            border: 1px solid #3d342b;
            padding: 0;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
            box-shadow: 10px 10px 20px rgba(0,0,0,0.6);
        }

        .expediente-card:hover {
            transform: rotate(-1deg) scale(1.02);
            border-color: var(--accent-orange);
        }

        .card-header {
            background: var(--accent-orange);
            color: #000;
            padding: 5px 15px;
            font-family: var(--vintage-font);
            font-weight: bold;
            font-size: 0.8rem;
            display: flex;
            justify-content: space-between;
        }

        .card-image {
            width: 100%;
            height: 250px;
            background-color: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #3d342b;
        }

        .card-body {
            padding: 20px;
        }

        .card-body h3 {
            font-family: var(--vintage-font);
            margin: 0 0 10px 0;
            font-size: 1.4rem;
            color: var(--accent-orange);
        }

        .card-body p {
            font-style: italic;
            font-size: 1.1rem;
            opacity: 0.8;
            line-height: 1.4;
        }

        .price-tag {
            font-family: 'Staatliches', cursive;
            font-size: 2rem;
            display: block;
            margin: 15px 0;
            color: #fff;
        }

        .btn-order {
            display: block;
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 2px solid var(--accent-orange);
            color: var(--accent-orange);
            font-family: var(--vintage-font);
            text-transform: uppercase;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-order:hover {
            background: var(--accent-orange);
            color: #000;
        }

        /* --- SELLO DE GOMA --- */
        .stamp {
            position: absolute;
            bottom: 80px;
            right: 10px;
            border: 4px solid #7a2222;
            color: #7a2222;
            padding: 5px 10px;
            border-radius: 10px;
            font-family: var(--vintage-font);
            font-weight: bold;
            opacity: 0.4;
            transform: rotate(-20deg);
            pointer-events: none;
            text-transform: uppercase;
        }

        /* BOTÓN FLOTANTE (BRÚJULA) */
        .compass-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 70px;
            height: 70px;
            background: radial-gradient(circle, #f39c12, #d35400);
            border-radius: 50%;
            border: 4px solid #2c3e50;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0,0,0,0.8);
            z-index: 1000;
        }

    </style>
</head>
<body>

        <div class="logo-area">
            <p style="font-family: var(--vintage-font); margin-bottom: 5px;">EST. 1926 — SUMINISTROS OFICIALES</p>
            <h1>OUTDOOR COMP</h1>
            <p class="weathered" style="font-style: italic;">"La aventura es solo un mal planeamiento... nosotros planeamos por ti."</p>
        </div>
    </header>

    <div class="container">
        <h2 class="section-title">MANIFIESTO DE EQUIPAMIENTO</h2>

        <div class="grid-expedientes">
            
            <div class="expediente-card">

                </div>
