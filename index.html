<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outdoor Comp - Archivos de Expedición</title>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Staatliches&family=EB+Garamond:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #1a1612;
            --accent-orange: #e67e22;
            --paper: #d2b48c;
            --ink: #2c251e;
            --vintage-font: 'Special Elite', cursive;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.05;
            pointer-events: none;
            z-index: 9999;
        }

        body {
            font-family: 'EB Garamond', serif;
            margin: 0;
            background-color: var(--bg-dark);
            color: var(--paper);
            background-image: linear-gradient(rgba(26, 22, 18, 0.85), rgba(26, 22, 18, 0.85)), url('https://images.unsplash.com/photo-1526772662000-3f88f10405ff?q=80&w=2000');
            background-attachment: fixed;
            background-size: cover;
        }

        header {
            border-bottom: 3px solid var(--accent-orange);
            padding: 40px 20px;
            text-align: center;
            background: rgba(0,0,0,0.6);
        }

        header h1 {
            font-family: 'Staatliches', cursive;
            font-size: 5rem;
            color: var(--accent-orange);
            margin: 0;
            letter-spacing: 10px;
            text-shadow: 4px 4px 0px #000;
        }

        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }

        /* --- SECCIÓN DEL MAPA (Indiana Jones Style) --- */
        .map-section {
            margin: 60px 0;
            padding: 40px;
            background: #2c251e url('https://www.transparenttextures.com/patterns/dark-leather.png');
            border: 10px solid #3d342b;
            border-image: url('https://www.transparenttextures.com/patterns/pinstriped-suit.png') 30 round;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            text-align: center;
        }

        .map-container {
            width: 100%;
            height: 450px;
            background: #e4d5b7;
            border: 2px solid #a68a56;
            position: relative;
            overflow: hidden;
            /* Filtro sepia para el mapa de Google */
            filter: sepia(0.8) contrast(1.2) brightness(0.9);
        }

        .map-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* --- TARJETAS DE PRODUCTO CON MARCO DE FOTO --- */
        .grid-expedientes {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
        }

        .expediente-card {
            background: #251f1a;
            border: 1px solid #3d342b;
            position: relative;
            transition: transform 0.3s ease;
            box-shadow: 10px 10px 25px rgba(0,0,0,0.7);
        }

        .card-image {
            width: 90%;
            margin: 15px auto;
            background: #fff; /* Marco blanco tipo foto antigua */
            padding: 10px 10px 40px 10px; /* Espacio abajo para parecer Polaroid */
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transform: rotate(-2deg);
        }

        .card-image img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            filter: grayscale(0.3) sepia(0.2);
        }

        .card-body { padding: 20px; text-align: center; }
        .card-body h3 { font-family: var(--vintage-font); color: var(--accent-orange); margin: 0; }
        .price-tag { font-family: 'Staatliches', cursive; font-size: 2.2rem; color: #fff; margin: 10px 0; display: block;}

        .btn-order {
            width: 100%;
            padding: 15px;
            background: transparent;
            border: 2px solid var(--accent-orange);
            color: var(--accent-orange);
            font-family: var(--vintage-font);
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-order:hover { background: var(--accent-orange); color: #000; }

        .compass-btn {
            position: fixed; bottom: 30px; right: 30px;
            width: 70px; height: 70px;
            background: radial-gradient(circle, #f39c12, #d35400);
            border-radius: 50%; border: 4px solid #2c3e50;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; cursor: pointer; z-index: 1000;
            animation: rotate 10s linear infinite;
        }

        @keyframes rotate { from {transform: rotate(0deg);} to {transform: rotate(360deg);} }

    </style>
</head>
<body>

    <header>
        <p style="font-family: var(--vintage-font); letter-spacing: 3px;">SUMINISTROS PARA TIEMPOS DIFÍCILES</p>
        <h1>OUTDOOR COMP</h1>
    </header>

    <div class="container">
        
        <div class="map-section">
            <h2 style="font-family: var(--vintage-font); margin-bottom: 20px;">DIARIO DE RUTA: UBICACIÓN DE LA BASE</h2>
            <div class="map-container">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3976.724123456789!2d-74.072092!3d4.60971!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zNMKwMzYnMzUuMCJOIDc0wrAwNCcxOS41Ilc!5e0!3m2!1ses!2sco!4v1620000000000!5m2!1ses!2sco" allowfullscreen="" loading="lazy"></iframe>
            </div>
            <p style="font-style: italic; margin-top: 15px; opacity: 0.7;">* Coordenadas clasificadas. Solo para personal autorizado.</p>
        </div>

        <h2 style="font-family: var(--vintage-font); text-align: center; border-bottom: 2px solid var(--accent-orange); padding-bottom: 10px;">CATÁLOGO DE RELIQUIAS</h2>
        
        <div class="grid-expedientes">
            
            <div class="expediente-card">
                <div class="card-image">
                    <img src="https://images.unsplash.com/photo-1504280390367-361c6d9f38f4?q=80&w=500" alt="Carpa">
                </div>
                <div class="card-body">
                    <h3>CARPA DE ASALTO</h3>
                    <span class="price-tag">$720.000</span>
                    <button class="btn-order">ADQUIRIR</button>
                </div>
            </div>

            <div class="expediente-card">
                <div class="card-image" style="transform: rotate(2deg);">
                    <img src="https://images.unsplash.com/photo-1533675114107-b01df5024576?q=80&w=500" alt="Morral">
                </div>
                <div class="card-body">
                    <h3>MORRAL DE LONA</h3>
                    <span class="price-tag">$485.000</span>
                    <button class="btn-order">ADQUIRIR</button>
                </div>
            </div>

            <div class="expediente-card">
                <div class="card-image">
                    <img src="https://images.unsplash.com/photo-1520038410233-7141be7e6f97?q=80&w=500" alt="Lámpara">
                </div>
                <div class="card-body">
                    <h3>FAROL VINTAGE</h3>
                    <span class="price-tag">$155.000</span>
                    <button class="btn-order">ADQUIRIR</button>
                </div>
            </div>

        </div>
    </div>

    <div class="compass-btn">🧭</div>

</body>
</html>
