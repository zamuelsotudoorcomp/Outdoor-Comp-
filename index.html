<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outdoor Comp | Archivos Clasificados</title>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Staatliches&family=EB+Garamond:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #1a1612;
            --accent-orange: #e67e22;
            --paper: #d2b48c;
            --vintage-font: 'Special Elite', cursive;
        }

        body {
            font-family: 'EB Garamond', serif;
            margin: 0; background-color: var(--bg-dark); color: var(--paper);
            overflow-x: hidden;
        }

        /* 1. HERO ANIMADO */
        .hero {
            height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=2000');
            background-size: cover; background-position: center;
            animation: panHero 20s infinite alternate;
        }
        @keyframes panHero {
            from { background-scale: 1; } to { background-scale: 1.1; }
        }
        .hero h1 { 
            font-family: 'Staatliches'; font-size: 6rem; color: var(--accent-orange); 
            margin: 0; animation: fadeInDown 1.5s; 
        }

        /* 2. FILTROS */
        .filter-container { text-align: center; margin: 40px 0; }
        .filter-btn {
            background: transparent; border: 1px solid var(--accent-orange);
            color: var(--accent-orange); padding: 10px 20px; cursor: pointer;
            font-family: var(--vintage-font); margin: 5px;
        }
        .filter-btn.active { background: var(--accent-orange); color: #000; }

        /* 3. CATÁLOGO */
        .catalog {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px; padding: 20px; max-width: 1200px; margin: auto;
        }
        .product-card {
            background: #251f1a; border: 1px solid #3d342b; padding: 15px;
            transition: 0.3s; position: relative;
        }
        .product-card img { width: 100%; height: 200px; object-fit: cover; filter: sepia(0.3); }

        /* 4. CARRITO FLOTANTE */
        .cart-status {
            position: fixed; top: 20px; right: 20px; background: var(--accent-orange);
            color: #000; padding: 15px; border-radius: 5px; cursor: pointer; z-index: 1000;
            font-family: var(--vintage-font); font-weight: bold;
        }

        /* 5. MODAL DE PAGO */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: var(--paper); color: #000; padding: 30px; width: 90%; max-width: 500px;
            font-family: var(--vintage-font);
        }

        /* 6. CHATBOT INTELIGENTE */
        .chat-box {
            position: fixed; bottom: 100px; right: 20px; width: 300px;
            background: #fff; color: #000; border-radius: 10px; display: none; flex-direction: column;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index: 3000;
        }
        .chat-header { background: var(--accent-orange); padding: 10px; color: #fff; font-weight: bold; border-radius: 10px 10px 0 0; }
        #chat-log { height: 200px; overflow-y: auto; padding: 10px; font-size: 0.9rem; }

        /* 7. ESTADÍSTICAS */
        .stats-section {
            background: var(--accent-orange); color: #000; padding: 50px 20px;
            display: flex; justify-content: space-around; text-align: center;
            font-family: 'Staatliches';
        }
        .stat-number { font-size: 3rem; display: block; }
    </style>
</head>
<body>

    <section class="hero">
        <p style="font-family: var(--vintage-font);">EXPEDICIÓN 2026</p>
        <h1>OUTDOOR COMP</h1>
        <a href="#productos" style="color: white; text-decoration: none; border: 1px solid white; padding: 10px 20px; margin-top: 20px;">VER EQUIPO</a>
    </section>

    <div class="cart-status" onclick="openCart()">
        🛒 EQUIPO: <span id="cart-count">0</span>
    </div>

    <div class="stats-section">
        <div><span class="stat-number">1,240</span>KM RECORRIDOS</div>
        <div><span class="stat-number">850</span>AVENTUREROS</div>
        <div><span class="stat-number">15</span>EXPEDICIONES</div>
    </div>

    <div class="filter-container" id="productos">
        <button class="filter-btn active" onclick="filterItems('all')">TODO</button>
        <button class="filter-btn" onclick="filterItems('camping')">CAMPING</button>
        <button class="filter-btn" onclick="filterItems('senderismo')">SENDERISMO</button>
    </div>

    <div class="catalog" id="product-list">
        </div>

    <div id="paymentModal" class="modal">
        <div class="modal-content">
            <h2>ORDEN DE SUMINISTROS</h2>
            <div id="cart-items-list"></div>
            <hr>
            <p>TOTAL: <span id="cart-total">$0</span></p>
            <button onclick="sendWhatsApp()" style="background: #25d366; color: white; width: 100%; padding: 15px; border: none; cursor: pointer;">
                CONFIRMAR POR WHATSAPP 📱
            </button>
            <button onclick="closeCart()" style="margin-top: 10px; width: 100%;">CERRAR</button>
        </div>
    </div>

    <div class="chat-box" id="chatWindow">
        <div class="chat-header">Asesor Virtual: Jones</div>
        <div id="chat-log">Hola explorador... ¿Buscas algo para tu viaje?</div>
        <input type="text" id="chat-input" placeholder="Escribe aquí..." onkeypress="handleChat(event)" style="padding: 10px;">
    </div>
    <div onclick="toggleChat()" style="position: fixed; bottom: 20px; right: 20px; background: var(--accent-orange); width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 2rem;">🤖</div>

    <script>
        // DATOS DE PRODUCTOS
        const products = [
            { id: 1, name: "Carpa de Asalto", price: 720000, cat: "camping", img: "https://images.unsplash.com/photo-1504280390367-361c6d9f38f4?q=80&w=500" },
            { id: 2, name: "Morral Lona", price: 485000, cat: "senderismo", img: "https://images.unsplash.com/photo-1533675114107-b01df5024576?q=80&w=500" },
            { id: 3, name: "Farol Aceite", price: 155000, cat: "camping", img: "https://images.unsplash.com/photo-1520038410233-7141be7e6f97?q=80&w=500" }
        ];

        let cart = [];

        // RENDERIZAR PRODUCTOS
        function renderProducts(items) {
            const list = document.getElementById('product-list');
            list.innerHTML = items.map(p => `
                <div class="product-card">
                    <img src="${p.img}">
                    <h3>${p.name}</h3>
                    <p>$${p.price.toLocaleString()}</p>
                    <button class="btn-order" onclick="addToCart(${p.id})">AÑADIR AL EQUIPO</button>
                </div>
            `).join('');
        }

        // FILTROS
        function filterItems(cat) {
            const filtered = cat === 'all' ? products : products.filter(p => p.cat === cat);
            renderProducts(filtered);
        }

        // CARRITO
        function addToCart(id) {
            const p = products.find(prod => prod.id === id);
            cart.push(p);
            updateCart();
            alert("Suministro añadido a la mochila");
        }

        function updateCart() {
            document.getElementById('cart-count').innerText = cart.length;
            const total = cart.reduce((sum, p) => sum + p.price, 0);
            document.getElementById('cart-total').innerText = '$' + total.toLocaleString();
            
            document.getElementById('cart-items-list').innerHTML = cart.map(i => `<li>${i.name}</li>`).join('');
        }

        function openCart() { document.getElementById('paymentModal').style.display = 'flex'; }
        function closeCart() { document.getElementById('paymentModal').style.display = 'none'; }

        // WHATSAPP INTEGRACIÓN
        function sendWhatsApp() {
            const text = `Hola Outdoor Comp! Quiero mi equipo: ${cart.map(i => i.name).join(', ')}`;
            const url = `https://wa.me/573000000000?text=${encodeURIComponent(text)}`;
            window.open(url, '_blank');
        }

        // CHATBOT SENCILLO
        function toggleChat() { 
            const win = document.getElementById('chatWindow');
            win.style.display = win.style.display === 'flex' ? 'none' : 'flex';
        }

        function handleChat(e) {
            if(e.key === 'Enter') {
                const input = e.target.value.toLowerCase();
                const log = document.getElementById('chat-log');
                log.innerHTML += `<div><b>Tú:</b> ${input}</div>`;
                
                let botMsg = "Interesante... ¿Necesitas equipo de camping?";
                if(input.includes("carpa")) botMsg = "La carpa de asalto es nuestra mejor reliquia.";
                if(input.includes("hola")) botMsg = "Bienvenido a la base, explorador.";

                setTimeout(() => {
                    log.innerHTML += `<div style="color: var(--accent-orange)"><b>Jones:</b> ${botMsg}</div>`;
                    log.scrollTop = log.scrollHeight;
                }, 500);
                e.target.value = "";
            }
        }

        // Carga inicial
        renderProducts(
        const products = [
            { 
                id: 1, 
                name: "Balón Pro 1 GOLARY", 
                price: 60000, 
                cat: "accesorios", 
                img: "navaja.jpg.jpeg" 
            },
            { 
                id: 2, 
                name: "Uniforme Blanco Glaxon", 
                price: 80000, 
                cat: "indumentaria", 
                img: "morral.jpg.jpeg" 
            },
            { 
                id: 3, 
                name: "Botas de Expedición", 
                price: 350000, 
                cat: "senderismo", 
                img: "radio1.jpg.jpeg" 
            },
            { 
                id: 4, 
                name: "Morral de Lona", 
                price: 120000, 
                cat: "senderismo", 
                img: "radio1.jpg.jpeg" 
            }
        ];
    </script>
</body>
</html>
