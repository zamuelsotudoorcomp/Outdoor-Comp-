<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glaxonsport | Base de Suministros</title>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Staatliches&family=EB+Garamond:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --accent-green: #39ff14; /* Verde neón Glaxon */
            --paper: #e0e0e0;
            --vintage-font: 'Special Elite', cursive;
        }

        body {
            font-family: 'EB Garamond', serif;
            margin: 0; background-color: var(--bg-dark); color: var(--paper);
            overflow-x: hidden;
        }

        /* HERO ANIMADO */
        .hero {
            height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1517649763962-0c623066013b?q=80&w=2000');
            background-size: cover; background-position: center;
        }
        .hero h1 { 
            font-family: 'Staatliches'; font-size: 6rem; color: var(--accent-green); 
            margin: 0; text-shadow: 0 0 20px rgba(57, 255, 20, 0.5);
        }

        /* FILTROS */
        .filter-container { text-align: center; margin: 40px 0; }
        .filter-btn {
            background: transparent; border: 1px solid var(--accent-green);
            color: var(--accent-green); padding: 10px 20px; cursor: pointer;
            font-family: var(--vintage-font); margin: 5px; transition: 0.3s;
        }
        .filter-btn.active, .filter-btn:hover { background: var(--accent-green); color: #000; }

        /* CATÁLOGO */
        .catalog {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px; padding: 20px; max-width: 1200px; margin: auto;
        }
        .product-card {
            background: #151515; border: 1px solid #333; padding: 15px;
            transition: 0.3s; text-align: center;
        }
        .product-card:hover { border-color: var(--accent-green); transform: translateY(-5px); }
        .product-card img { width: 100%; height: 250px; object-fit: cover; border-bottom: 1px solid #333; margin-bottom: 15px; }
        .btn-order {
            background: var(--accent-green); color: #000; border: none;
            padding: 10px 15px; cursor: pointer; font-family: var(--vintage-font); font-weight: bold; width: 100%;
        }

        /* CARRITO Y MODAL */
        .cart-status {
            position: fixed; top: 20px; right: 20px; background: var(--accent-green);
            color: #000; padding: 15px; border-radius: 5px; cursor: pointer; z-index: 1000;
            font-family: var(--vintage-font); font-weight: bold;
        }
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: #fff; color: #000; padding: 30px; width: 90%; max-width: 500px;
            font-family: var(--vintage-font); border-radius: 10px;
        }

        /* CHATBOT */
        .chat-box {
            position: fixed; bottom: 90px; right: 20px; width: 300px;
            background: #fff; color: #000; border-radius: 10px; display: none; flex-direction: column;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index: 3000;
        }
        .chat-header { background: var(--accent-green); padding: 10px; color: #000; font-weight: bold; }
        #chat-log { height: 200px; overflow-y: auto; padding: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <section class="hero">
        <p style="font-family: var(--vintage-font); color: white;">GLAXONSPORT 2026</p>
        <h1>EQUIPO PRO</h1>
        <a href="#productos" style="color: var(--accent-green); text-decoration: none; border: 1px solid var(--accent-green); padding: 10px 20px; margin-top: 20px;">EXPLORAR CATÁLOGO</a>
    </section>

    <div class="cart-status" onclick="openCart()">
        🛒 MOCHILA: <span id="cart-count">0</span>
    </div>

    <div class="filter-container" id="productos">
        <button class="filter-btn active" onclick="filterItems('all')">TODO</button>
        <button class="filter-btn" onclick="filterItems('accesorios')">ACCESORIOS</button>
        <button class="filter-btn" onclick="filterItems('indumentaria')">INDUMENTARIA</button>
        <button class="filter-btn" onclick="filterItems('senderismo')">SENDERISMO</button>
    </div>

    <div class="catalog" id="product-list">
        </div>

    <div id="paymentModal" class="modal">
        <div class="modal-content">
            <h2>RESUMEN DE PEDIDO</h2>
            <div id="cart-items-list"></div>
            <hr>
            <p><strong>TOTAL: <span id="cart-total">$0</span></strong></p>
            <button onclick="sendWhatsApp()" style="background: #25d366; color: white; width: 100%; padding: 15px; border: none; cursor: pointer; font-weight: bold;">
                PEDIR POR WHATSAPP 📱
            </button>
            <button onclick="closeCart()" style="margin-top: 10px; width: 100%; background: #ccc; border:none; padding: 10px;">VOLVER</button>
        </div>
    </div>

    <div onclick="toggleChat()" style="position: fixed; bottom: 20px; right: 20px; background: var(--accent-green); width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 2rem; z-index: 3001;">🤖</div>
    
    <div class="chat-box" id="chatWindow">
        <div class="chat-header">Asesor Glaxon</div>
        <div id="chat-log">¡Hola! Soy Jones. ¿En qué equipo estás interesado hoy?</div>
        <input type="text" id="chat-input" placeholder="Escribe aquí..." onkeypress="handleChat(event)" style="padding: 10px; border:none; border-top: 1px solid #ccc;">
    </div>

    <script>
        // 1. LISTA DE PRODUCTOS (Asegúrate que los nombres de imagen coincidan en GitHub)
        const products = [
            { id: 1, name: "Balón Pro 1 GOLARY", price: 60000, cat: "accesorios", img: "balon1.jpg" },
            { id: 2, name: "Uniforme Blanco Glaxon", price: 80000, cat: "indumentaria", img: "unif_blanco.jpg" },
            { id: 3, name: "Botas de Expedición", price: 350000, cat: "senderismo", img: "botas.jpg" },
            { id: 4, name: "Morral Pro Lona", price: 120000, cat: "senderismo", img: "morral.jpg" }
        ];

        let cart = [];

        // 2. FUNCIONES DE RENDERIZADO
        function renderProducts(items) {
            const list = document.getElementById('product-list');
            list.innerHTML = items.map(p => `
                <div class="product-card">
                    <img src="${p.img}" onerror="this.src='https://via.placeholder.com/250?text=Imagen+No+Encontrada'">
                    <h3>${p.name}</h3>
                    <p>$${p.price.toLocaleString()}</p>
                    <button class="btn-order" onclick="addToCart(${p.id})">AÑADIR AL CARRITO</button>
                </div>
            `).join('');
        }

        function filterItems(cat) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            const filtered = cat === 'all' ? products : products.filter(p => p.cat === cat);
            renderProducts(filtered);
        }

        // 3. LÓGICA DEL CARRITO
        function addToCart(id) {
            const p = products.find(prod => prod.id === id);
            cart.push(p);
            updateCart();
            alert(`${p.name} añadido.`);
        }

        function updateCart() {
            document.getElementById('cart-count').innerText = cart.length;
            const total = cart.reduce((sum, p) => sum + p.price, 0);
            document.getElementById('cart-total').innerText = '$' + total.toLocaleString();
            document.getElementById('cart-items-list').innerHTML = cart.map(i => `<li>${i.name} - $${i.price.toLocaleString()}</li>`).join('');
        }

        function openCart() { document.getElementById('paymentModal').style.display = 'flex'; }
        function closeCart() { document.getElementById('paymentModal').style.display = 'none'; }

        // 4. WHATSAPP (Cambia el número 573000000000)
        function sendWhatsApp() {
            if(cart.length === 0) return alert("El carrito está vacío");
            const text = `Hola Glaxonsport! Quiero comprar: ${cart.map(i => i.name).join(', ')}. Total: ${document.getElementById('cart-total').innerText}`;
            window.open(`https://wa.me/573000000000?text=${encodeURIComponent(text)}`, '_blank');
        }

        // 5. CHATBOT
        function toggleChat() { 
            const win = document.getElementById('chatWindow');
            win.style.display = win.style.display === 'flex' ? 'none' : 'flex';
        }

        function handleChat(e) {
            if(e.key === 'Enter') {
                const input = e.target.value.toLowerCase();
                const log = document.getElementById('chat-log');
                log.innerHTML += `<div><b>Tú:</b> ${e.target.value}</div>`;
                
                let resp = "No te entiendo, explorador. Prueba con 'balon' o 'botas'.";
                if(input.includes("hola")) resp = "¡Hola! Bienvenido a Glaxonsport.";
                if(input.includes("balon")) resp = "El Balón Golary es de alta durabilidad.";
                if(input.includes("botas")) resp = "Nuestras botas aguantan cualquier terreno.";

                setTimeout(() => {
                    log.innerHTML += `<div style="color:green"><b>Jones:</b> ${resp}</div>`;
                    log.scrollTop = log.scrollHeight;
                }, 500);
                e.target.value = "";
            }
        }

        // Carga inicial
        renderProducts(products);
    </script>
</body>
</html>
